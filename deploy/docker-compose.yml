version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: musecrea-backend
    restart: always
    volumes:
      - ../backend/uploads:/app/backend/uploads
      - ../backend/musecrea.db:/app/backend/musecrea.db
    environment:
      - DATABASE_URL=sqlite:///./musecrea.db
    networks:
      - musecrea-network

  nginx:
    image: nginx:alpine
    container_name: musecrea-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - musecrea-network

  certbot:
    image: certbot/certbot
    container_name: musecrea-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - musecrea-network

networks:
  musecrea-network:
    driver: bridge
